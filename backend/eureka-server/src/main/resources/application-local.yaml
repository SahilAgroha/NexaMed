# ── Local dev profile ─────────────────────────────────────────────
# Use this when running WITHOUT Docker:
#   mvn spring-boot:run -Dspring-boot.run.profiles=local

server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    eviction-interval-timer-in-ms: 5000
    # Disable self-preservation locally so dead instances evict fast
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Suppress noisy Eureka logs in dev
logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    org.springframework.cloud.netflix: INFO
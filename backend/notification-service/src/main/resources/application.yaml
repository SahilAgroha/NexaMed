server:
  port: 8086

spring:
  application:
    name: notification-service

  # ── Redis — pub/sub for multi-instance broadcasting ──────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Kafka — consumes events from course-service ──────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nexamed.*"
        # Map incoming JSON to our local DTO (no need for exact class match)
        spring.json.value.default.type: com.nexamed.notification.dto.EnrollmentEvent

# ── Eureka ────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# ── Kafka topic names — must match course-service exactly ─────────
kafka:
  topics:
    enrollment-created: enrollment.created
    course-completed: course.completed
    quiz-submitted: quiz.submitted

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
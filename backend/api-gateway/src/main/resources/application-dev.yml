server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:3000
                  - http://localhost:5173
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true

          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user-service-internal
              uri: lb://user-service
              predicates:
                - Path=/api/users/internal/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - AuthFilter

            - id: course-service
              uri: lb://course-service
              predicates:
                - Path=/api/courses/**
              filters:
                - AuthFilter

            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**
              filters:
                - AuthFilter

            - id: interview-service
              uri: lb://interview-service
              predicates:
                - Path=/api/interviews/**
              filters:
                - AuthFilter

            - id: interview-ws
              uri: lb:ws://interview-service
              predicates:
                - Path=/ws/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - AuthFilter

            - id: analytics-service
              uri: lb://analytics-service
              predicates:
                - Path=/api/analytics/**
              filters:
                - AuthFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-12345678901234567890}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG